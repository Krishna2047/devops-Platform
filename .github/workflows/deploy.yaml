name: DevOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Docker login
      run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

    - name: Build image
      run: docker build -t krishna/devops-app:latest .

    - name: Push image
      run: docker push krishna/devops-app:latest

    - name: Deploy
      run: kubectl apply -f k8s/